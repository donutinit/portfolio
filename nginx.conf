server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── security headers ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # ─── compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    # ─── astro hashed assets: cache forever ───────────────
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── media (volume mount from truenas dataset) ────────
    # nginx serves static files with Accept-Ranges by default
    # which enables video seeking + partial downloads
    location /media/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ─── old public routes ─────────────────────────────────
    location ~ ^/work/(.+)/?$ {
        return 301 /obra/$1/;
    }

    location = /video {
        return 301 /obra/#cintas;
    }

    location = /video/ {
        return 301 /obra/#cintas;
    }

    # ─── images at root: cache forever ────────────────────
    location ~* \.(jpg|jpeg|png|webp|avif|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── html: clean urls + 404 ───────────────────────────
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # ─── sitemap + robots: short cache ────────────────────
    location = /robots.txt {
        expires 1d;
        access_log off;
    }

    location ~ ^/sitemap.*\.xml$ {
        expires 1d;
        access_log off;
    }

    # ─── error pages ──────────────────────────────────────
    error_page 404 /404.html;
}
